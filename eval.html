<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cameron B. Chiarot - Evaluation & Links</title>
    <style>
        :root {
            --uwaterloo-gold: #FFD54F;
            --uwaterloo-black: #222222;
            --text-gray: #555555;
            --bg-color: #FAFAFA;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--uwaterloo-black);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            text-align: center;
        }

        .profile-header {
            margin-bottom: 40px;
        }

        .profile-name {
            font-size: 1.8rem;
            font-weight: 700;
            margin: 0 0 5px 0;
        }

        .profile-title {
            font-size: 1rem;
            color: var(--text-gray);
            margin: 0;
            font-weight: 400;
        }

        .hero-button {
            display: inline-block;
            background-color: var(--uwaterloo-black);
            color: #ffffff;
            font-size: 1.2rem;
            font-weight: 600;
            text-decoration: none;
            padding: 18px 40px;
            border-radius: 8px;
            width: 100%;
            max-width: 320px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.2s ease, background-color 0.2s ease;
            margin-bottom: 40px;
        }

        .hero-button:hover {
            transform: translateY(-2px);
            background-color: #000000;
        }

        .secondary-links {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            max-width: 320px;
        }

        .link-item {
            color: var(--text-gray);
            text-decoration: none;
            font-size: 1rem;
            font-weight: 500;
            padding: 10px;
            border-bottom: 1px solid #eaeaea;
            transition: color 0.2s ease;
        }

        .link-item:hover {
            color: var(--uwaterloo-black);
            border-bottom: 1px solid var(--uwaterloo-black);
        }

        .link-item:last-child {
            border-bottom: none;
        }
    </style>
</head>
<body>

    <div class="profile-header">
        <h1 class="profile-name">Dr. Cameron B. Chiarot</h1>
        <p class="profile-title">Health Economist | Epidemiologist | Biostatistician</p>
    </div>

    <a href="<iframe src="https://docs.google.com/forms/d/e/1FAIpQLSc1ALjZToCsC82d3UFOZrt-I-F3-1MHfOCSc22TJOGhAsJ2Rw/viewform?embedded=true" width="800" height="2344" frameborder="0" marginheight="0" marginwidth="0">Loading…</iframe>" class="hero-button" target="_blank">Guest Lecture Evaluation</a>

    <div class="secondary-links">
        <a href="bio.html" class="link-item">Biography & Research Focus</a>
        <a href="https://uwaterloo.ca/public-health-research-analytics-lab/profiles/cameron-b-chiarot" class="link-item" target="_blank">University of Waterloo</a>
        <a href="https://www.linkedin.com/in/cameronchiarot" class="link-item" target="_blank">LinkedIn</a>
    </div>

</body>
</html>
